name: Pipeline A · Vollständiger Analyse-Workflow

on:
  workflow_dispatch:
    inputs:
      input_file:
        description: "Input-Datei (relativ zum Repo-Root)"
        required: false
        default: "tink_demo_transactions.json"
      output_dir:
        description: "Ausgabeverzeichnis"
        required: false
        default: "."

jobs:
  pipeline:
    name: "Kategorisierung → Muster → Firestore → Prognose"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: "① Checkout"
        uses: actions/checkout@v4

      - name: "② Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "③ Dependencies installieren"
        run: pip install -r requirements.txt

      - name: "④ Firebase Credentials schreiben"
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/serviceaccount.json

      - name: "⑤ Pipeline ausführen"
        env:
          ANTHROPIC_API_KEY:              ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/serviceaccount.json
          INPUT_FILE:                     ${{ github.event.inputs.input_file }}
          OUTPUT_DIR:                     ${{ github.event.inputs.output_dir }}
        run: python pipeline.py

      - name: "⑥ Outputs als Artifact speichern"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: |
            tink_categorized.json
            tink_patterns.json
          retention-days: 30

      - name: "⑦ Outputs committen"
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tink_categorized.json tink_patterns.json
          git diff --cached --quiet || git commit -m "ci: pipeline-a output [skip ci]"
          git push

      - name: "⑧ Credentials aufräumen"
        if: always()
        run: rm -f /tmp/serviceaccount.json
