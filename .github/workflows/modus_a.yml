name: Modus A – Pipeline

on:
  workflow_dispatch:        # ← Manuell per Klick startbar

jobs:
  modus-a:
    runs-on: ubuntu-latest

    steps:
      - name: "1. Code holen"
        uses: actions/checkout@v4

      - name: "2. Python installieren"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "3. Abhängigkeiten installieren"
        run: pip install anthropic python-dateutil

      - name: "4. Pipeline ausführen"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py
