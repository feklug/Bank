name: Pipeline Training

on:
  workflow_dispatch:
    inputs:
      silent_mode:
        description: "Datenschutz: Outputs + Logs unterdrücken"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  training:
    name: "Kategorisierung → Muster → Firestore → Prognose"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: "① Checkout"
        uses: actions/checkout@v4

      - name: "② Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "③ Dependencies"
        run: pip install -r requirements.txt

      - name: "④ Firebase Credentials"
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/serviceaccount.json

      - name: "⑤ Training Pipeline ausführen"
        env:
          ANTHROPIC_API_KEY:              ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/serviceaccount.json
          INPUT_FILE:                     data/training.json
          SILENT_MODE:                    ${{ github.event.inputs.silent_mode }}
        run: python training/pipeline.py

      - name: "⑥ Credentials aufräumen"
        if: always()
        run: rm -f /tmp/serviceaccount.json
