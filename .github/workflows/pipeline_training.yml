name: Pipeline A · Vollständiger Analyse-Workflow

on:
  workflow_dispatch:
    inputs:
      input_file:
        description: "Input-Datei (relativ zum Repo-Root)"
        required: false
        default: "tink_demo_transactions.json"
      silent_mode:
        description: "Datenschutz: Outputs + Logs unterdrücken"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  pipeline:
    name: "Kategorisierung → Muster → Firestore → Prognose"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: "① Checkout"
        uses: actions/checkout@v4

      - name: "② Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "③ Dependencies installieren"
        run: pip install -r requirements.txt

      - name: "④ Firebase Credentials schreiben"
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/serviceaccount.json

      - name: "⑤ Pipeline ausführen"
        env:
          ANTHROPIC_API_KEY:              ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/serviceaccount.json
          INPUT_FILE:                     ${{ github.event.inputs.input_file }}
          SILENT_MODE:                    ${{ github.event.inputs.silent_mode }}
        run: python pipeline.py

      - name: "⑥ Credentials aufräumen"
        if: always()
        run: rm -f /tmp/serviceaccount.json
